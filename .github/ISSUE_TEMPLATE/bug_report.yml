name: 🐛 Bug report
description: Reportar um comportamento inesperado
title: "bug: "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Descrição
      description: O que está acontecendo?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Passos para reproduzir
      description: Liste os passos, idealmente numerados.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Em qual ambiente o bug foi encontrado?
      options:
        - dev
        - staging
        - production
        - local
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Contexto adicional
      description: Logs, screenshots, versões…
