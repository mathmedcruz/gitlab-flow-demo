name: Deploy • production

on:
  push:
    branches: [production]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy para production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.exemplo.local
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Rodar testes
        run: pytest -q

      - name: Resolver versão (tag exata ou describe)
        id: meta
        run: |
          VERSION=$(git describe --tags --exact-match 2>/dev/null || git describe --tags --always)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: 🚀 Simulando deploy para PRODUCTION
        env:
          APP_ENV: production
          APP_VERSION: ${{ steps.meta.outputs.version }}
          SHA: ${{ steps.meta.outputs.sha_short }}
        run: |
          echo "=============================================="
          echo " Ambiente : $APP_ENV"
          echo " Versão   : $APP_VERSION"
          echo " Commit   : $SHA"
          echo " Branch   : ${GITHUB_REF_NAME}"
          echo "=============================================="
          echo "→ build de release..."
          sleep 1
          echo "→ health checks pré-deploy..."
          sleep 1
          echo "→ publicando artefato em produção..."
          sleep 1
          echo "✅ Deploy para PRODUCTION concluído."

      - name: Resumo no GitHub
        run: |
          {
            echo "### 🚀 Deploy PRODUCTION"
            echo ""
            echo "- **Versão:** \`${{ steps.meta.outputs.version }}\`"
            echo "- **Commit:** \`${{ steps.meta.outputs.sha_short }}\`"
            echo "- **Branch:** \`${GITHUB_REF_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"
