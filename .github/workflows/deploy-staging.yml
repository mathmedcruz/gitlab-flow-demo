name: Deploy • staging

on:
  push:
    branches: [staging]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy para staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.exemplo.local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci || npm install

      - name: Rodar testes
        run: npm test

      - name: Ler versão
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: 🚀 Simulando deploy para STAGING
        env:
          APP_ENV: staging
          VERSION: ${{ steps.meta.outputs.version }}
          SHA: ${{ steps.meta.outputs.sha_short }}
        run: |
          echo "=============================================="
          echo " Ambiente : $APP_ENV"
          echo " Versão   : $VERSION"
          echo " Commit   : $SHA"
          echo " Branch   : ${GITHUB_REF_NAME}"
          echo "=============================================="
          echo "→ build..."
          sleep 1
          echo "→ smoke tests..."
          sleep 1
          echo "→ publicando artefato..."
          sleep 1
          echo "✅ Deploy para STAGING concluído."

      - name: Resumo no GitHub
        run: |
          {
            echo "### 🚀 Deploy STAGING"
            echo ""
            echo "- **Versão:** \`${{ steps.meta.outputs.version }}\`"
            echo "- **Commit:** \`${{ steps.meta.outputs.sha_short }}\`"
            echo "- **Branch:** \`${GITHUB_REF_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"
