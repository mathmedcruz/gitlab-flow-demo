name: Promote

# Promoção automatizada entre branches de ambiente.
#
# Uso manual (linha de comando):
#   gh workflow run promote.yml -f target=staging
#   gh workflow run promote.yml -f target=production
#
# Uso automático (opcional): dispara sempre que o workflow "CI" fecha verde
# em main e promove main → staging. Para desligar, remova o gatilho
# `workflow_run` abaixo.

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Ambiente para o qual promover'
        type: choice
        required: true
        options:
          - staging
          - production
      dry_run:
        description: 'Apenas simular (não pusha)'
        type: boolean
        default: false
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

concurrency:
  group: promote-${{ inputs.target || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  promote:
    name: Promove ${{ inputs.target || 'main → staging' }}
    runs-on: ubuntu-latest

    # workflow_run só prossegue se o CI passou.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Resolver source/target
        id: plan
        env:
          EVENT: ${{ github.event_name }}
          INPUT_TARGET: ${{ inputs.target }}
        run: |
          # workflow_run (automático) sempre promove main → staging.
          if [[ "$EVENT" == "workflow_run" ]]; then
            TARGET=staging
          else
            TARGET="$INPUT_TARGET"
          fi
          case "$TARGET" in
            staging)    SOURCE=main ;;
            production) SOURCE=staging ;;
            *) echo "::error::target inválido: $TARGET"; exit 1 ;;
          esac
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "Promovendo $SOURCE → $TARGET"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PROMOTE_TOKEN é um PAT/App token com permissão de push nas
          # branches protegidas. Se não existir, cai no GITHUB_TOKEN (que
          # funciona se o ruleset permitir GitHub Actions no bypass list).
          token: ${{ secrets.PROMOTE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configurar git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verificar se há algo a promover
        id: diff
        env:
          SOURCE: ${{ steps.plan.outputs.source }}
          TARGET: ${{ steps.plan.outputs.target }}
        run: |
          git fetch origin "$SOURCE" "$TARGET"
          SOURCE_SHA=$(git rev-parse "origin/$SOURCE")
          TARGET_SHA=$(git rev-parse "origin/$TARGET")
          echo "source_sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

          # Se target já contém tudo que está em source, não faz nada.
          if git merge-base --is-ancestor "origin/$SOURCE" "origin/$TARGET"; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️ $TARGET já contém $SOURCE ($SOURCE_SHA). Nada a promover."
          else
            echo "no_changes=false" >> "$GITHUB_OUTPUT"
            echo "Commits a promover:"
            git log --oneline "origin/$TARGET..origin/$SOURCE" | head -20
          fi

      - name: Merge e push
        if: steps.diff.outputs.no_changes == 'false'
        env:
          SOURCE: ${{ steps.plan.outputs.source }}
          TARGET: ${{ steps.plan.outputs.target }}
          SOURCE_SHA: ${{ steps.diff.outputs.source_sha }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          git checkout "$TARGET"
          git merge --no-ff "origin/$SOURCE" \
            -m "chore(promote): $SOURCE → $TARGET" \
            -m "Source SHA: $SOURCE_SHA"

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "🟡 dry_run=true — pulando push."
            git --no-pager log -1
          else
            git push origin "$TARGET"
            echo "✅ Promoção concluída: $SOURCE ($SOURCE_SHA) → $TARGET"
          fi

      - name: Resumo
        if: always()
        env:
          SOURCE: ${{ steps.plan.outputs.source }}
          TARGET: ${{ steps.plan.outputs.target }}
          SOURCE_SHA: ${{ steps.diff.outputs.source_sha }}
          TARGET_SHA: ${{ steps.diff.outputs.target_sha }}
          NO_CHANGES: ${{ steps.diff.outputs.no_changes }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          {
            echo "### 🔀 Promote"
            echo ""
            echo "| Campo | Valor |"
            echo "| --- | --- |"
            echo "| Source | \`$SOURCE\` @ \`${SOURCE_SHA:0:7}\` |"
            echo "| Target | \`$TARGET\` @ \`${TARGET_SHA:0:7}\` |"
            echo "| Sem mudanças? | $NO_CHANGES |"
            echo "| Dry run | ${DRY_RUN:-false} |"
            echo "| Disparado por | \`${{ github.actor }}\` via \`${{ github.event_name }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
